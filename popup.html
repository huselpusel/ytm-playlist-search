<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>YTM Playlist Search</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 230px;
      background: #1f1f1f;
      color: #e0e0e0;
      font-family: 'Roboto', 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      padding: 14px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #333;
    }
    .header-icon {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
    }
    .header-icon img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }
    .header-title { font-size: 13px; font-weight: 600; color: #fff; line-height: 1.2; }
    .header-sub   { font-size: 10px; color: #777; }

    .section-label {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 8px;
    }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.12s;
      margin-bottom: 4px;
      border: 1.5px solid transparent;
    }
    .option:hover { background: #2a2a2a; }
    .option.selected {
      background: #2a1515;
      border-color: #ff4444;
    }

    .option input[type="radio"] {
      margin-top: 1px;
      accent-color: #ff0000;
      flex-shrink: 0;
      cursor: pointer;
    }

    .option-text { flex: 1; }
    .option-title {
      font-size: 12.5px;
      font-weight: 500;
      color: #f0f0f0;
      margin-bottom: 2px;
    }
    .option-desc {
      font-size: 11px;
      color: #777;
      line-height: 1.4;
    }

    .footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #2e2e2e;
      font-size: 10.5px;
      color: #555;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">
      <img src="icon128.png" alt="YTM Playlist Search">
    </div>
    <div>
      <div class="header-title">YTM Playlist Search</div>
      <div class="header-sub">Click the button on any playlist</div>
    </div>
  </div>

  <div class="section-label">When you click a result</div>

  <label class="option" id="opt-scroll">
    <input type="radio" name="action" value="scroll" />
    <div class="option-text">
      <div class="option-title">↕ Scroll to song</div>
      <div class="option-desc">Jumps to the song's position in the playlist and highlights it.</div>
    </div>
  </label>

  <label class="option" id="opt-play">
    <input type="radio" name="action" value="play" />
    <div class="option-text">
      <div class="option-title">▶ Play directly</div>
      <div class="option-desc">Starts playing the song immediately, staying in the playlist queue.</div>
    </div>
  </label>

  <div class="footer">Setting is saved automatically</div>

  <script src="popup.js"></script>
</body>
</html>
